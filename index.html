<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1E293B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Memora</title>
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/dist/tabler-icons.min.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #0f172a;
      }
      .memora-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      .memora-splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .memora-splash-logo {
        width: 150px;
        height: 150px;
        object-fit: contain;
        margin-bottom: 24px;
      }
      .memora-splash-text {
        font-size: 18px;
        color: #e2e8f0;
        font-weight: 600;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="memora-splash" id="splash-screen">
      <img class="memora-splash-logo" src="%BASE_URL%memora-logo.png" alt="Memora" />
      <div class="memora-splash-text">Memora</div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
